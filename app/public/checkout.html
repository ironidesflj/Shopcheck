<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — ShopCheck</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>
    <header class="site-header">
      <a class="brand" href="/">ShopCheck</a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="/">Produtos</a>
        <a class="cart-link" href="/cart.html">
          Carrinho (<span id="cart-count">0</span>)
        </a>
      </nav>
    </header>

    <main id="main-content">
      <h1>Checkout</h1>
      <p class="lead">Finalize seu pedido. Campos marcados com * são obrigatórios.</p>

      <div id="checkout-message" role="alert" hidden></div>

      <form id="checkout-form" class="panel form-grid" novalidate>
        <label>
          Nome completo *
          <input id="customer-name" name="name" type="text" required autocomplete="name" />
        </label>
        <label>
          E-mail *
          <input id="customer-email" name="email" type="email" required autocomplete="email" />
        </label>
        <label>
          Endereço de entrega *
          <input id="customer-address" name="address" type="text" required autocomplete="street-address" />
        </label>
        <label>
          Cupom de desconto
          <input id="coupon-code" name="coupon" type="text" placeholder="Ex: SAVE10" />
        </label>
        <button type="button" id="apply-coupon">Aplicar cupom</button>
        <p id="coupon-feedback" aria-live="polite"></p>

        <div class="cart-summary" aria-label="Resumo final">
          <div class="summary-row"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
          <div class="summary-row"><span>Desconto</span><span id="discount">R$ 0,00</span></div>
          <div class="summary-row"><span>Frete</span><span id="shipping">R$ 15,90</span></div>
          <div class="summary-row total"><span>Total</span><span id="total">R$ 0,00</span></div>
        </div>

        <button type="submit" id="place-order">Confirmar pedido</button>
      </form>
    </main>

    <footer class="site-footer">ShopCheck — QA Portfolio Project</footer>

    <script type="module">
      import {
        clearCart,
        formatMoney,
        getCart,
        getSubtotal,
        updateCartBadge,
      } from "/js/cart.js";

      const SHIPPING_FEE = 15.9;
      const form = document.getElementById("checkout-form");
      const message = document.getElementById("checkout-message");
      const couponFeedback = document.getElementById("coupon-feedback");

      let appliedCoupon = null;
      let discount = 0;
      let shipping = SHIPPING_FEE;

      function showMessage(text, type = "error") {
        message.hidden = false;
        message.className = type === "error" ? "error-banner" : "success-banner";
        message.textContent = text;
      }

      function updateSummary() {
        const cart = getCart();
        if (cart.length === 0) {
          window.location.href = "/cart.html";
          return;
        }

        const subtotal = getSubtotal(cart);
        const total = Math.max(subtotal - discount + shipping, 0);

        document.getElementById("subtotal").textContent = formatMoney(subtotal);
        document.getElementById("discount").textContent = formatMoney(discount);
        document.getElementById("shipping").textContent =
          shipping === 0 ? "Grátis" : formatMoney(shipping);
        document.getElementById("total").textContent = formatMoney(total);
      }

      document.getElementById("apply-coupon").addEventListener("click", async () => {
        const code = document.getElementById("coupon-code").value.trim();
        const subtotal = getSubtotal(getCart());

        couponFeedback.textContent = "";
        appliedCoupon = null;
        discount = 0;
        shipping = SHIPPING_FEE;

        if (!code) {
          couponFeedback.textContent = "Informe um cupom.";
          updateSummary();
          return;
        }

        const response = await fetch("/api/coupons/validate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, subtotal }),
        });
        const data = await response.json();

        if (!response.ok || !data.valid) {
          couponFeedback.textContent = data.error || "Cupom inválido.";
          updateSummary();
          return;
        }

        appliedCoupon = data.code;
        if (data.type === "percent") {
          discount = Math.round(subtotal * (data.value / 100) * 100) / 100;
        } else if (data.type === "shipping") {
          shipping = 0;
        }

        couponFeedback.textContent = data.message;
        updateSummary();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.hidden = true;

        const cart = getCart();
        if (cart.length === 0) {
          showMessage("Seu carrinho está vazio.");
          return;
        }

        const customer = {
          name: document.getElementById("customer-name").value.trim(),
          email: document.getElementById("customer-email").value.trim(),
          address: document.getElementById("customer-address").value.trim(),
        };

        if (!customer.name || !customer.email || !customer.address) {
          showMessage("Preencha todos os campos obrigatórios.");
          return;
        }

        const response = await fetch("/api/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            customer,
            items: cart.map((item) => ({
              productId: item.productId,
              quantity: item.quantity,
            })),
            couponCode: appliedCoupon,
          }),
        });

        const data = await response.json();
        if (!response.ok) {
          showMessage(data.error || "Não foi possível concluir o pedido.");
          return;
        }

        clearCart();
        sessionStorage.setItem("shopcheck_last_order", JSON.stringify(data));
        window.location.href = `/confirmation.html?orderId=${data.id}`;
      });

      updateCartBadge();
      updateSummary();
    </script>
  </body>
</html>
